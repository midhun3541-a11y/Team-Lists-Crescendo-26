<!DOCTYPE html>
<html lang="en">

<head>
  <!-- your other stuff -->

  <!-- Google Analytics -->
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9X2QVECNVE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-9X2QVECNVE');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crescendo 26 Team List</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ====== INTRO CINEMATIC OVERLAY ====== -->
  <div class="intro-overlay" id="intro-overlay">
    <div class="intro-bg-image"></div>
    <div class="intro-content">
      <div class="intro-line intro-line--1" id="intro-line-1">Crescendo'26</div>
      <div class="intro-line intro-line--2" id="intro-line-2">by Troizeantz</div>
      <div class="intro-line intro-line--3" id="intro-line-3">Team List</div>
    </div>
  </div>

  <div class="bg-scene" aria-hidden="true">
    <div class="bg-orb bg-orb--one"></div>
    <div class="bg-orb bg-orb--two"></div>
    <div class="bg-orb bg-orb--three"></div>
    <div class="bg-grid"></div>
  </div>
  <main class="app-shell">
    <section class="topbar" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">Crescendo '26 · Troizeantz</p>
        <h1 id="page-title">Team List</h1>
      </div>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="global-search" class="search-input" placeholder="Search members..." aria-label="Search members" autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>
    </section>

    <section class="workspace" aria-label="Interactive team browser">
      <aside class="team-panel">
        <div class="panel-heading">
          <span>Teams</span>
        </div>
        <div class="team-list" id="team-list"></div>
      </aside>

      <section class="details-panel">
        <div class="details-header">
          <div class="team-identity">
            <div class="logo-stack">
              <p class="eyebrow">House</p>
              <span id="team-logo-slot"></span>
            </div>
            <h2 id="selected-team">Select a Team</h2>
          </div>
        </div>
        <div class="batch-grid" id="batch-grid"></div>
      </section>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
